<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Stop Planning, Start Winning · Sudharsan K R</title>
<meta name="description" content="A guided reading experience. Read the book, exchange notes with Arjun, receive a personalised strategic diagnosis.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/style.css">
<style>
  /* Shell-only styles — not part of the design system */

  /* Initial loader — shown before app.js takes over */
  #app-loader {
    position: fixed;
    inset: 0;
    background: var(--white);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    transition: opacity 0.3s ease;
  }
  #app-loader.hide {
    opacity: 0;
    pointer-events: none;
  }
  .loader-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--ink);
    margin: 0 4px;
    animation: loaderPulse 1.2s ease-in-out infinite;
  }
  .loader-dot:nth-child(2) { animation-delay: 0.2s; }
  .loader-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes loaderPulse {
    0%, 80%, 100% { transform: scale(0.6); opacity: 0.3; }
    40%           { transform: scale(1);   opacity: 1; }
  }

  /* Error state */
  #app-error {
    display: none;
    position: fixed;
    inset: 0;
    background: var(--white);
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
    padding: 32px;
    text-align: center;
  }
  #app-error.show { display: flex; }
  .error-title {
    font: 600 1.125rem/1.3 'Inter', sans-serif;
    color: var(--ink);
  }
  .error-sub {
    font: 400 0.9375rem/1.6 'Inter', sans-serif;
    color: var(--ink-2);
    max-width: 360px;
  }
</style>
</head>
<body>

<!-- Initial loader -->
<div id="app-loader">
  <div style="display:flex;align-items:center;">
    <div class="loader-dot"></div>
    <div class="loader-dot"></div>
    <div class="loader-dot"></div>
  </div>
</div>

<!-- Error fallback -->
<div id="app-error">
  <div class="error-title">Something went wrong</div>
  <div class="error-sub">Please refresh the page. If the problem continues, try clearing your browser cache.</div>
  <button class="btn btn-primary" onclick="window.location.reload()">Refresh</button>
</div>

<!-- Main shell — app.js populates #stage -->
<div id="shell">

  <!-- TOP BAR -->
  <div id="bar">
    <div class="bar-left">
      <span class="bar-book" id="bar-book">Book Two</span>
      <div class="bar-sep" id="bar-sep"></div>
      <span class="bar-ch" id="bar-ch">Why Great Manufacturers Stay Invisible</span>
    </div>
    <div class="bar-right">
      <button class="bar-shelf-btn" id="bar-shelf-btn" onclick="window.location.href='https://manufacturing-shelf-65462349033.asia-south1.run.app'" style="display:none;">← My Library</button>
      <div id="dots"></div>
    </div>
  </div>

  <!-- STAGE — chapter screens injected here by app.js -->
  <div id="stage"></div>

</div>

<!-- Load app.js as ES module -->
<script type="module" src="/app.js?v=2"></script>

</body>
</html>
